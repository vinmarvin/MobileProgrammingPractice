name: touch_some_grass
description: TouchSomeGrass - Wellbeing & Productivity App
publish_to: 'none'
version: 1.5.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

  # ── State Management ──────────────────────────────────────
  provider: ^6.1.2

  # ── Notifications ─────────────────────────────────────────
  awesome_notifications: ^0.11.0

  # ── Media / Storage ───────────────────────────────────────
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.2

  #Audio player untuk fitur relaksasi suara alam
  audioplayers: ^6.1.0

  # YouTube player embed di dalam app (tanpa buka browser)
  youtube_player_flutter: ^9.0.3

  # Geotagging on-demand saat ambil foto
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # ── Utilities ─────────────────────────────────────────────
  url_launcher: ^6.2.5
  intl: ^0.20.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/       
